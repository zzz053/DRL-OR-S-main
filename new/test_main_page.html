
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络拓扑可视化 - Root Controller</title>
    <script src="https://unpkg.com/vis-network@9.1.2/standalone/umd/vis-network.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 600;
        }
        .stats {
            display: flex;
            gap: 30px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            display: block;
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .content {
            padding: 20px;
        }
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #48bb78;
            color: white;
        }
        .btn-secondary:hover {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(72, 187, 120, 0.4);
        }
        select {
            padding: 10px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            transition: border 0.3s;
        }
        select:hover, select:focus {
            border-color: #667eea;
            outline: none;
        }
        #network {
            width: 100%;
            height: 700px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            background: #fafafa;
        }
        .info-panel {
            margin-top: 20px;
            padding: 20px;
            background: #f7fafc;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .info-panel h3 {
            color: #2d3748;
            margin-bottom: 10px;
            font-size: 18px;
        }
        .info-panel pre {
            background: white;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.6;
        }
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 2px solid #e2e8f0;
        }
        .status {
            position: absolute;
            top: 30px;
            right: 30px;
            padding: 8px 16px;
            background: white;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .status.connected {
            color: #38a169;
            border: 2px solid #38a169;
        }
        .status.error {
            color: #e53e3e;
            border: 2px solid #e53e3e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌐 网络拓扑可视化</h1>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-value" id="stat-controllers">0</span>
                    <span class="stat-label">Controllers</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="stat-switches">0</span>
                    <span class="stat-label">Switches</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="stat-hosts">0</span>
                    <span class="stat-label">Hosts</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="stat-links">0</span>
                    <span class="stat-label">Links</span>
                </div>
            </div>
        </div>
        
        <div class="content">
            <div class="controls">
                <button class="btn btn-primary" onclick="refreshTopology()">🔄 刷新拓扑</button>
                <button class="btn btn-secondary" onclick="fitNetwork()">📍 自适应缩放</button>
                <button class="btn btn-primary" onclick="testAPI()">🔍 测试API</button>
                <select id="layout-select" onchange="changeLayout()">
                    <option value="hierarchical">层次布局</option>
                    <option value="physics">物理布局</option>
                    <option value="circle">环形布局</option>
                </select>
                <span class="status connected" id="status">● 已连接</span>
            </div>
            
            <div id="network"></div>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #ff6b6b;"></div>
                    <span>根控制器</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #a78bfa;"></div>
                    <span>从控制器</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #4dabf7;"></div>
                    <span>交换机</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #51cf66;"></div>
                    <span>主机</span>
                </div>
            </div>
            
            <div class="info-panel" id="info-panel" style="display: none;">
                <h3>节点信息</h3>
                <pre id="node-info"></pre>
            </div>
        </div>
    </div>

    <script>
        let network = null;
        let nodes = null;
        let edges = null;
        
        // 初始化网络图
        function initNetwork() {
            try {
                console.log('开始初始化网络图...');
                
                // 检查vis库是否加载
                if (typeof vis === 'undefined') {
                    console.error('vis.js库未加载！');
                    document.getElementById('network').innerHTML = '<div style="padding: 50px; text-align: center; color: red;"><h2>错误：vis.js库加载失败</h2><p>请检查网络连接或使用离线版本</p></div>';
                    return;
                }
                
                console.log('vis.js库已加载');
                
                const container = document.getElementById('network');
                nodes = new vis.DataSet([]);
                edges = new vis.DataSet([]);
                
                console.log('DataSet创建完成');
                
                const data = { nodes: nodes, edges: edges };
                const options = {
                nodes: {
                    shape: 'dot',
                    size: 20,
                    font: {
                        size: 14,
                        color: '#2d3748',
                        face: 'Arial'
                    },
                    borderWidth: 2,
                    shadow: true
                },
                edges: {
                    width: 2,
                    shadow: true,
                    smooth: {
                        type: 'continuous'
                    },
                    arrows: {
                        to: {
                            enabled: true,
                            scaleFactor: 0.5
                        }
                    }
                },
                layout: {
                    hierarchical: {
                        enabled: true,
                        direction: 'UD',
                        sortMethod: 'directed',
                        levelSeparation: 150,
                        nodeSpacing: 200
                    }
                },
                physics: {
                    enabled: false
                },
                interaction: {
                    hover: true,
                    tooltipDelay: 100
                }
            };
            
                console.log('开始创建vis.Network...');
                network = new vis.Network(container, data, options);
                console.log('vis.Network创建完成');
                
                // 节点点击事件
                network.on('click', function(params) {
                    if (params.nodes.length > 0) {
                        showNodeInfo(params.nodes[0]);
                    }
                });
                
                console.log('事件监听器已设置');
                
                // 加载拓扑
                console.log('准备加载拓扑数据...');
                refreshTopology();
                
                // 自动刷新（每5秒）
                setInterval(refreshTopology, 5000);
                console.log('自动刷新已启用（每5秒）');
                
            } catch (err) {
                console.error('初始化网络图失败:', err);
                document.getElementById('network').innerHTML = '<div style="padding: 50px; text-align: center; color: red;"><h2>初始化失败</h2><p>' + err.message + '</p></div>';
            }
        }
        
        // 刷新拓扑数据
        async function refreshTopology() {
            try {
                console.log('正在获取拓扑数据...');
                const response = await fetch('/api/graph');
                
                if (!response.ok) {
                    throw new Error(`HTTP错误: ${response.status} ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('成功获取拓扑数据:', data);
                
                updateNetwork(data);
                updateStatistics();
                
                document.getElementById('status').className = 'status connected';
                document.getElementById('status').textContent = '● 已连接';
            } catch (error) {
                console.error('获取拓扑数据失败:', error);
                console.error('错误详情:', error.message);
                document.getElementById('status').className = 'status error';
                document.getElementById('status').textContent = '● 连接错误: ' + error.message;
            }
        }
        
        // 更新网络图
        function updateNetwork(data) {
            try {
                const graphNodes = data.nodes || [];
                const graphEdges = data.edges || [];
                
                console.log('收到拓扑数据:', data);
                console.log('节点数量:', graphNodes.length);
                console.log('边数量:', graphEdges.length);
                
                // 清空现有数据
                nodes.clear();
                edges.clear();
                
                // 添加节点
                let addedNodes = 0;
                graphNodes.forEach((nodeObj, index) => {
                    try {
                        // 适配新的数据格式：{id: ..., data: {...}}
                        const nodeId = nodeObj.id || nodeObj;
                        const nodeData = nodeObj.data || {};
                        const nodeType = nodeData.node_type || 'unknown';
                        
                        let color, size, shape, label;
                        
                        // 根据节点类型设置样式
                        if (nodeId === 'RootController' || nodeType === 'root_controller') {
                            color = '#ff6b6b';
                            size = 40;
                            shape = 'star';
                            label = '根控';
                        } else if (nodeType === 'controller') {
                            color = '#a78bfa';
                            size = 30;
                            shape = 'diamond';
                            label = '从控-' + index;
                        } else if (nodeType === 'switch') {
                            color = '#4dabf7';
                            size = 25;
                            shape = 'box';
                            label = 'SW' + nodeId;
                        } else if (nodeType === 'host') {
                            color = '#51cf66';
                            size = 20;
                            shape = 'dot';
                            label = 'H' + nodeId;
                        } else {
                            // 未知类型，根据ID推断
                            color = '#cbd5e0';
                            size = 20;
                            shape = 'dot';
                            label = String(nodeId);
                        }
                        
                        console.log(`添加节点 ${index}: ID=${nodeId}, Type=${nodeType}, Label=${label}`);
                        
                        nodes.add({
                            id: nodeId,
                            label: label,
                            color: color,
                            size: size,
                            shape: shape,
                            title: String(nodeId)
                        });
                        
                        addedNodes++;
                    } catch (err) {
                        console.error('添加节点失败:', nodeObj, err);
                    }
                });
                
                console.log('已添加节点数:', addedNodes, '/', graphNodes.length);
            
                // 添加边
                let addedEdges = 0;
                graphEdges.forEach((edgeObj, index) => {
                    try {
                        // 适配新的数据格式：{source: ..., target: ..., data: {...}}
                        let source, target, edgeData;
                        
                        if (edgeObj.source !== undefined && edgeObj.target !== undefined) {
                            // 新格式
                            source = edgeObj.source;
                            target = edgeObj.target;
                            edgeData = edgeObj.data || {};
                        } else if (Array.isArray(edgeObj) && edgeObj.length >= 2) {
                            // 旧格式（兼容）
                            [source, target, edgeData] = edgeObj;
                        } else {
                            console.warn('无效的边格式:', edgeObj);
                            return;
                        }
                        
                        const edgeType = edgeData?.edge_type || 'unknown';
                        
                        let color, width, dashes;
                        
                        if (edgeType === 'controller_connection') {
                            color = '#ff6b6b';
                            width = 3;
                            dashes = true;
                        } else if (edgeType === 'controller_switch') {
                            color = '#a78bfa';
                            width = 2;
                            dashes = [5, 5];
                        } else if (edgeType === 'host_switch') {
                            color = '#51cf66';
                            width = 1.5;
                            dashes = false;
                        } else if (edgeType === 'switch_link') {
                            color = '#4dabf7';
                            width = 2;
                            dashes = false;
                        } else {
                            color = '#cbd5e0';
                            width = 2;
                            dashes = false;
                        }
                        
                        console.log(`添加边 ${index}: ${source} -> ${target} (${edgeType})`);
                        
                        edges.add({
                            id: `edge-${index}`,
                            from: source,
                            to: target,
                            color: color,
                            width: width,
                            dashes: dashes,
                            title: `${source} -> ${target}`
                        });
                        
                        addedEdges++;
                    } catch (err) {
                        console.error('添加边失败:', edgeObj, err);
                    }
                });
                
                console.log('已添加边数:', addedEdges, '/', graphEdges.length);
                
                // 触发网络图更新
                if (network) {
                    network.fit();
                }
            } catch (err) {
                console.error('updateNetwork失败:', err);
            }
        }
        
        // 更新统计信息
        async function updateStatistics() {
            try {
                const response = await fetch('/api/statistics');
                const stats = await response.json();
                
                document.getElementById('stat-controllers').textContent = stats.controllers || 0;
                document.getElementById('stat-switches').textContent = stats.switches || 0;
                document.getElementById('stat-hosts').textContent = stats.hosts || 0;
                document.getElementById('stat-links').textContent = stats.links || 0;
            } catch (error) {
                console.error('获取统计信息失败:', error);
            }
        }
        
        // 测试API连接
        async function testAPI() {
            console.log('=== 开始API测试 ===');
            
            // 测试健康检查
            try {
                console.log('测试 /api/health...');
                const healthResp = await fetch('/api/health');
                const healthData = await healthResp.json();
                console.log('✓ 健康检查成功:', healthData);
                alert(`API连接正常！
控制器数: ${healthData.controllers}
图节点数: ${healthData.graph_nodes}
图边数: ${healthData.graph_edges}`);
            } catch (error) {
                console.error('✗ 健康检查失败:', error);
                alert(`API连接失败！
请检查：
1. 根控制器是否运行
2. 浏览器控制台查看详细错误
3. 确认端口5000未被占用`);
                return;
            }
            
            // 测试图数据
            try {
                console.log('测试 /api/graph...');
                const graphResp = await fetch('/api/graph');
                const graphData = await graphResp.json();
                console.log('✓ 图数据获取成功:', graphData);
                console.log(`  节点数: ${graphData.nodes.length}`);
                console.log(`  边数: ${graphData.edges.length}`);
            } catch (error) {
                console.error('✗ 图数据获取失败:', error);
            }
            
            // 测试统计信息
            try {
                console.log('测试 /api/statistics...');
                const statsResp = await fetch('/api/statistics');
                const statsData = await statsResp.json();
                console.log('✓ 统计信息获取成功:', statsData);
            } catch (error) {
                console.error('✗ 统计信息获取失败:', error);
            }
            
            console.log('=== API测试完成 ===');
        }
        
        // 显示节点信息
        function showNodeInfo(nodeId) {
            const node = nodes.get(nodeId);
            if (node) {
                const infoPanel = document.getElementById('info-panel');
                const nodeInfo = document.getElementById('node-info');
                
                nodeInfo.textContent = JSON.stringify({
                    id: node.id,
                    label: node.label,
                    type: node.shape,
                    color: node.color
                }, null, 2);
                
                infoPanel.style.display = 'block';
            }
        }
        
        // 自适应缩放
        function fitNetwork() {
            if (network) {
                network.fit({
                    animation: {
                        duration: 1000,
                        easingFunction: 'easeInOutQuad'
                    }
                });
            }
        }
        
        // 切换布局
        function changeLayout() {
            const layout = document.getElementById('layout-select').value;
            
            let options = {};
            
            if (layout === 'hierarchical') {
                options = {
                    layout: {
                        hierarchical: {
                            enabled: true,
                            direction: 'UD',
                            sortMethod: 'directed',
                            levelSeparation: 150,
                            nodeSpacing: 200
                        }
                    },
                    physics: { enabled: false }
                };
            } else if (layout === 'physics') {
                options = {
                    layout: {
                        hierarchical: { enabled: false }
                    },
                    physics: {
                        enabled: true,
                        barnesHut: {
                            gravitationalConstant: -2000,
                            centralGravity: 0.3,
                            springLength: 200,
                            springConstant: 0.04
                        }
                    }
                };
            } else if (layout === 'circle') {
                options = {
                    layout: {
                        hierarchical: { enabled: false }
                    },
                    physics: { enabled: false }
                };
                
                // 手动设置环形布局
                const nodeIds = nodes.getIds();
                const radius = 300;
                const angleStep = (2 * Math.PI) / nodeIds.length;
                
                nodeIds.forEach((id, index) => {
                    const angle = index * angleStep;
                    const x = radius * Math.cos(angle);
                    const y = radius * Math.sin(angle);
                    nodes.update({ id: id, x: x, y: y });
                });
            }
            
            network.setOptions(options);
            fitNetwork();
        }
        
        // 页面加载完成后初始化
        console.log('脚本已加载');
        window.addEventListener('load', function() {
            console.log('页面load事件触发');
            initNetwork();
        });
        
        // 备用：DOMContentLoaded事件
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOMContentLoaded事件触发');
        });
    </script>
</body>
</html>
